stages:
  - build
  - deploy
  - topology-sync

variables:
  HARBOR_URL: "192.168.10.238"
  HARBOR_PROJECT: "satellite"
  HARBOR_PUBLIC_PROJECT: "library"
  BACKEND_IMAGE: "$HARBOR_URL/$HARBOR_PROJECT/backend:$CI_COMMIT_SHORT_SHA"
  FRONTEND_IMAGE: "$HARBOR_URL/$HARBOR_PROJECT/frontend:$CI_COMMIT_SHORT_SHA"
  DOCKER_DRIVER: overlay2
  # CI 运行镜像统一走内网 Harbor，避免外网镜像拉取失败
  CI_DOCKER_IMAGE: "$HARBOR_URL/$HARBOR_PUBLIC_PROJECT/docker:25.0-amd64-r1"
  CI_BUILD_IMAGE: "$HARBOR_URL/$HARBOR_PUBLIC_PROJECT/ci-build:docker25-git-amd64-r3"
  CI_KUBECTL_IMAGE: "$HARBOR_URL/$HARBOR_PUBLIC_PROJECT/bitnami-kubectl:latest-amd64-r1"
  CI_ALPINE_IMAGE: "$HARBOR_URL/$HARBOR_PUBLIC_PROJECT/alpine:3.19-amd64-r1"
  BASE_IMAGE_REGISTRY: "$HARBOR_URL/$HARBOR_PUBLIC_PROJECT"
  # 内网 GitLab 私有仓库地址（HTTPS），示例：
  # https://gitlab.example.local/your-group/Satellite-Remote-Sensing.git
  REMOTE_SENSING_REPO_URL: ""
  REMOTE_SENSING_REPO_REF: "main"

# 构建并推送后端镜像
build-backend:
  stage: build
  image: "$CI_BUILD_IMAGE"
  variables:
    # Runner 已挂载宿主机 docker.sock，避免再启 dind
    DOCKER_HOST: "unix:///var/run/docker.sock"
  script:
    - docker version
    - |
      if [ -z "$HARBOR_USER" ] || [ -z "$HARBOR_PASSWORD" ]; then
        echo "HARBOR_USER 或 HARBOR_PASSWORD 未配置（建议在 GitLab CI/CD Variables 中配置同名变量）"
        exit 1
      fi
    - |
      if [ -z "$REMOTE_SENSING_REPO_URL" ]; then
        echo "REMOTE_SENSING_REPO_URL 未配置，请先在内网 GitLab 建仓并配置该变量"
        exit 1
      fi
    - |
      case "$REMOTE_SENSING_REPO_URL" in
        https://*)
          AUTH_REMOTE_SENSING_REPO_URL="$(echo "$REMOTE_SENSING_REPO_URL" | sed "s#^https://#https://gitlab-ci-token:${CI_JOB_TOKEN}@#")"
          ;;
        http://*)
          AUTH_REMOTE_SENSING_REPO_URL="$(echo "$REMOTE_SENSING_REPO_URL" | sed "s#^http://#http://gitlab-ci-token:${CI_JOB_TOKEN}@#")"
          ;;
        *)
          echo "REMOTE_SENSING_REPO_URL 必须是 HTTP(S) 地址"
          exit 1
          ;;
      esac
    - git ls-remote "$AUTH_REMOTE_SENSING_REPO_URL" > /dev/null
    - rm -rf backend/remote-sensing-src
    - git clone --depth 1 --branch "$REMOTE_SENSING_REPO_REF" "$AUTH_REMOTE_SENSING_REPO_URL" backend/remote-sensing-src
    - docker login "$HARBOR_URL" -u "$HARBOR_USER" -p "$HARBOR_PASSWORD"
    - cd backend
    - docker build --build-arg BASE_IMAGE_REGISTRY="$BASE_IMAGE_REGISTRY" -t "$BACKEND_IMAGE" .
    - docker push "$BACKEND_IMAGE"
    - docker tag "$BACKEND_IMAGE" "$HARBOR_URL/$HARBOR_PROJECT/backend:latest"
    - docker push "$HARBOR_URL/$HARBOR_PROJECT/backend:latest"
  tags:
    - k8s-cluster-runner
  only:
    - main

# 构建并推送前端镜像
build-frontend:
  stage: build
  image: "$CI_BUILD_IMAGE"
  variables:
    # Runner 已挂载宿主机 docker.sock，避免再启 dind
    DOCKER_HOST: "unix:///var/run/docker.sock"
  script:
    - docker version
    - |
      if [ -z "$HARBOR_USER" ] || [ -z "$HARBOR_PASSWORD" ]; then
        echo "HARBOR_USER 或 HARBOR_PASSWORD 未配置（建议在 GitLab CI/CD Variables 中配置同名变量）"
        exit 1
      fi
    - docker login "$HARBOR_URL" -u "$HARBOR_USER" -p "$HARBOR_PASSWORD"
    - cd frontend
    # 可选：在 GitLab CI/CD Variables 中配置 VITE_GRAFANA_URL，主页「性能监控中台」将直跳 Grafana
    - |
      BUILD_ARGS=""
      if [ -n "${VITE_GRAFANA_URL:-}" ]; then
        BUILD_ARGS="--build-arg VITE_GRAFANA_URL=$VITE_GRAFANA_URL"
      fi
      docker build --build-arg BASE_IMAGE_REGISTRY="$BASE_IMAGE_REGISTRY" $BUILD_ARGS -t "$FRONTEND_IMAGE" .
    - docker push "$FRONTEND_IMAGE"
  tags:
    - k8s-cluster-runner
  only:
    - main

deploy:
  stage: deploy
  image: "$CI_KUBECTL_IMAGE"
  script:
    - echo "部署到 namespace=gitlab-runner"
    - sh scripts/remote_sensing_preflight.sh --namespace gitlab-runner --deployment satellite-backend --pvc remote-sensing-data
    # - kubectl -n gitlab-runner apply -f k8s/backend/remote-sensing-pv-pvc.yaml
    - kubectl -n gitlab-runner get pvc remote-sensing-data
    # 应用/更新后端 Deployment + Service
    - kubectl -n gitlab-runner apply -f k8s/backend/deployment.yaml
    - kubectl -n gitlab-runner set image deployment/satellite-backend satellite-backend="$BACKEND_IMAGE"
    - kubectl -n gitlab-runner rollout status deployment/satellite-backend
    # 应用/更新前端 Deployment + Service
    - kubectl -n gitlab-runner apply -f k8s/frontend/deployment.yaml
    - kubectl -n gitlab-runner set image deployment/satellite-frontend satellite-frontend="$FRONTEND_IMAGE"
    - kubectl -n gitlab-runner rollout status deployment/satellite-frontend
    # Istio Gateway + VirtualService（需预先执行一次：kubectl apply -f k8s/istio-rbac-gitlab-runner.yaml）
    # 以授权 gitlab-runner 在 istio-system 中创建 Gateway/VirtualService
    - kubectl apply -f k8s/istio-gateway.yaml
    - kubectl apply -f k8s/istio-virtualservice.yaml
  tags:
    - k8s-cluster-runner
  needs:
    - build-backend
    - build-frontend
  only:
    - main

sync-topology-csv-to-nfs:
  stage: topology-sync
  image: "$CI_ALPINE_IMAGE"
  tags:
    - k8s-cluster-runner
  needs:
    - deploy
  script:
    - apk add --no-cache openssh-client rsync
    # 准备 SSH key
    - mkdir -p ~/.ssh
    - echo "$NFS_SSH_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -p "${NFS_SSH_PORT:-22}" "$NFS_SSH_HOST" >> ~/.ssh/known_hosts
    # 同步 CSV 到 NFS 目录（覆盖更新）
    - |
      RSYNC_BASE="$NFS_SSH_USER@$NFS_SSH_HOST:/export/topology-data"
      echo "同步 delay_15x15.csv 到 $RSYNC_BASE"
      rsync -av --delete frontend/public/data/delay_15x15.csv "$RSYNC_BASE/"
      echo "同步 ephem_15/ 到 $RSYNC_BASE/ephem_15/"
      rsync -av --delete frontend/public/data/ephem_15/ "$RSYNC_BASE/ephem_15/"
      echo "同步 router/ 到 $RSYNC_BASE/router/"
      rsync -av --delete frontend/public/data/router/ "$RSYNC_BASE/router/"
  only:
    - main

import-topology:
  stage: topology-sync
  image: "$CI_KUBECTL_IMAGE"
  tags:
    - k8s-cluster-runner
  needs:
    - sync-topology-csv-to-nfs
  script:
    - echo "删除旧的导入 Job（若存在）"
    - kubectl -n gitlab-runner delete job import-topology || true
    - echo "应用新的导入 Job 清单"
    - kubectl -n gitlab-runner apply -f k8s/backend/import-topology-job.yaml
    - echo "等待导入 Job 完成..."
    - kubectl -n gitlab-runner wait --for=condition=complete --timeout=600s job/import-topology
    - echo "导入 Job 日志："
    - kubectl -n gitlab-runner logs job/import-topology --tail=100
  only:
    - main
