apiVersion: apps/v1
kind: Deployment
metadata:
  name: satellite-backend
  namespace: gitlab-runner
  labels:
    app: satellite-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: satellite-backend
  template:
    metadata:
      labels:
        app: satellite-backend
    spec:
      initContainers:
        - name: init-remote-sensing-dirs
          image: 192.168.10.238/library/alpine:3.19-amd64-r1
          command:
            - /bin/sh
            - -c
            - |
              set -e
              mkdir -p /mnt/input /mnt/output_preprocessing /mnt/dem /scratch/output_preprocessing
              chmod -R 0777 /mnt/input /mnt/output_preprocessing /mnt/dem /scratch/output_preprocessing
          volumeMounts:
            - name: remote-sensing-data
              mountPath: /mnt
            - name: remote-sensing-scratch-output
              mountPath: /scratch/output_preprocessing
      containers:
        - name: satellite-backend
          image: 192.168.10.238/satellite/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SATELLITE_SERVER_PORT
              value: "8080"
            - name: SATELLITE_SERVER_MODE
              value: "production"
            - name: SATELLITE_DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: satellite-db-secret
                  key: host
            - name: SATELLITE_DATABASE_PORT
              value: "5432"
            - name: SATELLITE_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: satellite-db-secret
                  key: user
            - name: SATELLITE_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: satellite-db-secret
                  key: password
            - name: SATELLITE_DATABASE_DBNAME
              valueFrom:
                secretKeyRef:
                  name: satellite-db-secret
                  key: dbname
            - name: SATELLITE_LOG_LEVEL
              value: "info"
            - name: SATELLITE_TOPOLOGY_AUTO_IMPORT
              valueFrom:
                secretKeyRef:
                  name: satellite-backend-env
                  key: SATELLITE_TOPOLOGY_AUTO_IMPORT
            - name: SATELLITE_TOPOLOGY_SCENARIO
              valueFrom:
                secretKeyRef:
                  name: satellite-backend-env
                  key: SATELLITE_TOPOLOGY_SCENARIO
            - name: SATELLITE_DELAY_CSV
              valueFrom:
                secretKeyRef:
                  name: satellite-backend-env
                  key: SATELLITE_DELAY_CSV
            - name: SATELLITE_REMOTE_SENSING_ROOT
              value: "/opt/remote-sensing"
            - name: SATELLITE_REMOTE_SENSING_PYTHON
              value: "/opt/remote-sensing/.venv/bin/python"
            - name: SATELLITE_REMOTE_SENSING_DEM_FILE
              value: "/opt/remote-sensing-data/dem/GMTED2010.jp2"
            - name: SATELLITE_REMOTE_SENSING_PERSIST_OUTPUT_DIR
              value: "persist_output_preprocessing"
          resources:
            requests:
              memory: "1Gi"
              cpu: "300m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          volumeMounts:
            - name: remote-sensing-data
              mountPath: /opt/remote-sensing/input
              subPath: input
            - name: remote-sensing-scratch-output
              mountPath: /opt/remote-sensing/output_preprocessing
            - name: remote-sensing-data
              mountPath: /opt/remote-sensing/persist_output_preprocessing
              subPath: output_preprocessing
            - name: remote-sensing-data
              mountPath: /opt/remote-sensing-data/dem
              subPath: dem
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
      volumes:
        - name: remote-sensing-data
          persistentVolumeClaim:
            claimName: remote-sensing-data
        - name: remote-sensing-scratch-output
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: satellite-backend
  namespace: gitlab-runner
spec:
  type: ClusterIP
  selector:
    app: satellite-backend
  ports:
    - port: 8080
      targetPort: 8080
